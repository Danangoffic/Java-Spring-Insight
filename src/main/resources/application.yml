spring:
  application:
    name: insight
  profiles:
    active: default

  datasource:
    url: jdbc:postgresql://postgres-db:5432/insight_db
    username: insight_user
    password: insight_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: redis-cache
      port: 6379
    mongodb:
      uri: mongodb://mongodb:27017/insight_db

  elasticsearch:
    uris: http://elasticsearch:9200

  kafka:
    bootstrap-servers: kafka-broker:9092
    consumer:
      group-id: insight-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.example.insight.model,com.example.insight.messaging"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

---
# Local profile for running application directly on your machine (connecting to localhost services)
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/insight_db
  data:
    redis:
      host: localhost
    mongodb:
      uri: mongodb://localhost:27017/insight_db
  kafka:
    bootstrap-servers: localhost:9092
  elasticsearch:
    uris: http://localhost:9200

---
# Mock profile for running application locally with zero external dependencies (H2, In-Memory Caching, Mock Kafka/Redis)
server:
  port: 8081
spring:
  main:
    allow-bean-definition-overriding: true
  config:
    activate:
      on-profile: mock
  datasource:
    url: jdbc:h2:mem:insight_db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  cache:
    type: simple
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration

